name: Backend Wake Up

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  poke_server:
    runs-on: ubuntu-latest
    steps:
      - name: Poke Backend Server
        run: |
          if [ -n "${{ secrets.BACKEND_URL }}" ]; then
            curl -sf "${{ secrets.BACKEND_URL }}/" || echo "Backend not reachable"
          else
            echo "BACKEND_URL secret not configured, skipping"
          fi
