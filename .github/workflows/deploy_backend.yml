name: Verify Groq & Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'modules/**'
      - 'requirements.txt'
      - 'Procfile'
      - 'render.yaml'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  verify-groq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Groq API key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 -c "
          import os, requests
          key = os.environ.get('GROQ_API_KEY', '')
          assert key, 'GROQ_API_KEY secret is missing'
          r = requests.post(
              'https://api.groq.com/openai/v1/chat/completions',
              headers={'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'},
              json={'model': 'llama-3.1-8b-instant', 'messages': [{'role': 'user', 'content': 'ping'}], 'max_tokens': 5},
              timeout=30,
          )
          print(f'Groq API status: {r.status_code}')
          assert r.status_code == 200, f'Groq API failed: {r.text}'
          print('Groq API key verified successfully')
          "

  sync-render-repo:
    needs: verify-groq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync backend files to slang_dictionary via GitHub API
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not set — skipping slang_dictionary sync"
            exit 0
          fi

          upload_file() {
            local file="$1"
            local dest="$2"
            local sha
            sha=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/Benjamin5607/slang_dictionary/contents/$dest" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

            local content
            content=$(base64 -w0 "$file")

            local payload
            if [ -n "$sha" ]; then
              payload=$(python3 -c "import json; print(json.dumps({'message':'Sync unified backend [auto]','content':'$content','sha':'$sha'}))")
            else
              payload=$(python3 -c "import json; print(json.dumps({'message':'Sync unified backend [auto]','content':'$content'}))")
            fi

            curl -sf -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Benjamin5607/slang_dictionary/contents/$dest" \
              -d "$payload"
            echo "Updated $dest"
          }

          upload_file "app.py" "app.py"
          upload_file "requirements.txt" "requirements.txt"
          upload_file "Procfile" "Procfile"

          for modfile in modules/risk_war_room.py modules/slang_curator.py; do
            upload_file "$modfile" "$modfile"
          done

          echo "Backend synced to slang_dictionary — Render will auto-deploy"

      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -sf "$DEPLOY_HOOK"
            echo "Render deploy hook triggered"
          fi

      - name: Wait for Render backend
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            if curl -sf "https://slang-dictionary-p04y.onrender.com/api/models" > /dev/null 2>&1; then
              echo "Unified backend is live at /api/models"
              exit 0
            fi
            echo "Waiting for Render deploy ($i/8)..."
            sleep 30
          done
          echo "Backend not yet on unified version — Render may still be deploying"

  build-container:
    needs: verify-groq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE="ghcr.io/benjamin5607/global-culture-risk-api:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Container image pushed: $IMAGE"
